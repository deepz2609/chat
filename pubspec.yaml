name: quickchat
description: "A lightweight Flutter chat app with Firebase"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any
  emoji_picker_flutter: ^4.0.0
  image_picker: ^1.1.2
  flutter_contacts: ^1.1.9
  permission_handler: ^11.3.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
